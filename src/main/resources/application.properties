# Nom de l'application
spring.application.name=itsupport

# Configuration de la base de données H2 (en mémoire)
spring.datasource.url=jdbc:h2:mem:itsupportdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Dialecte Hibernate pour H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console H2 (permet d'inspecter la base de données via le navigateur)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Hibernate DDL Auto (crée ou met à jour les tables automatiquement à partir des entités JPA)
spring.jpa.hibernate.ddl-auto=update

# Affiche les requêtes SQL générées dans les logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Propriétés JWT personnalisées
jwt.secret=MySuperSecretKeyThatIsVeryLongAndSecure1234567890!
jwt.expiration=86400000
